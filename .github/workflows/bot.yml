name: Run Polybot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: polybot-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL: ${{ secrets.BANKROLL }}

      - name: Persist state

        if: always()
        run: |
          git rebase --abort 2>/dev/null || true
          rm -fr .git/rebase-merge 2>/dev/null || true
          git stash --include-untracked 2>/dev/null || true
          git stash drop 2>/dev/null || true
          git config user.name "polybot"
          git config user.email "polybot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git checkout main
          git add polybot.db bankroll.txt peak_bankroll.txt last_train.txt regime_state.json killed_strategies.json daily_benchmarks.json last_weekly.txt || true
          git diff --staged --quiet || git commit -m "chore: state [skip ci]"
          git push origin main --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
