name: Run Polybot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            polybot.db
            bankroll.txt
            peak_bankroll.txt
            last_train.txt
            killed_strategies.json
            regime_state.json
            models/edge_model.pkl
            models/regime_kmeans.pkl
          key: polybot-state-v3-${{ github.run_id }}
          restore-keys: polybot-state-v3-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL: ${{ secrets.BANKROLL }}

      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            polybot.db
            bankroll.txt
            peak_bankroll.txt
            last_train.txt
            killed_strategies.json
            regime_state.json
            models/edge_model.pkl
            models/regime_kmeans.pkl
          key: polybot-state-v3-${{ github.run_id }}
